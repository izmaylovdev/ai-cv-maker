apiVersion: 1

datasources:
  - name: Prometheus
    uid: prom-cv-maker
    type: prometheus
    access: proxy
    url: ${PROMETHEUS_URL:-http://prometheus:9090}
    isDefault: true
    jsonData:
      timeInterval: "15s"

  - name: PostgreSQL
    uid: pg-cv-maker
    type: postgres
    access: proxy
    url: ${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}
    database: ${POSTGRES_DB}
    user: ${POSTGRES_USER}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      sslmode: ${POSTGRES_SSL_MODE:-disable}
      postgresVersion: 1600
