syntax = "proto3";

package llm;

option csharp_namespace = "CvApi.Grpc";

service LlmService {
  rpc Generate (GenerateRequest) returns (GenerateResponse);
  rpc Optimize (OptimizeRequest) returns (OptimizeResponse);
  rpc ExtractProfile (ExtractProfileRequest) returns (ExtractProfileResponse);
  rpc EnhanceField (EnhanceFieldRequest) returns (EnhanceFieldResponse);
  rpc Chat (ChatRequest) returns (ChatResponse);
  rpc UserChat (UserChatRequest) returns (UserChatResponse);
  rpc Health (HealthRequest) returns (HealthResponse);
  rpc GenerateCoverLetter (CoverLetterRequest) returns (CoverLetterResponse);
  rpc SelectBestProfile (SelectBestProfileRequest) returns (SelectBestProfileResponse);
}

message WorkExperienceInput {
  string id = 1;
  string company = 2;
  string role = 3;
  string start_date = 4;
  string end_date = 5;
  string description = 6;
}

message EducationInput {
  string id = 1;
  string institution = 2;
  string degree = 3;
  string field = 4;
  int32 start_year = 5;
  int32 end_year = 6;
}

message SkillInput {
  string id = 1;
  string name = 2;
  string level = 3;
}

message ProfileInput {
  string full_name = 1;
  string title = 2;
  string overview = 3;
  string location = 4;
  repeated WorkExperienceInput work_experiences = 5;
  repeated EducationInput educations = 6;
  repeated SkillInput skills = 7;
}

message GenerateRequest {
  ProfileInput profile = 1;
  string message = 2;
  string global_preferences = 3;
}

message WorkExperienceOutput {
  string company = 1;
  string role = 2;
  string period = 3;
  string description = 4;
}

message EducationOutput {
  string institution = 1;
  string degree = 2;
  string field = 3;
  string period = 4;
}

message UsageMetadata {
  int32  prompt_tokens     = 1;
  int32  completion_tokens = 2;
  string model_name        = 3;
}

message GenerateResponse {
  string summary = 1;
  repeated WorkExperienceOutput work_experiences = 2;
  repeated EducationOutput educations = 3;
  repeated string skills = 4;
  repeated string highlights = 5;
  UsageMetadata usage = 6;
}

message OptimizeRequest {
  ProfileInput profile = 1;
  string message = 2;
  string global_preferences = 3;
}

message OptimizeWorkExperienceOutput {
  string company = 1;
  string role = 2;
  string start_date = 3;
  string end_date = 4;
  string description = 5;
}

message OptimizeSkillOutput {
  string name = 1;
}

message OptimizeResponse {
  string title = 1;
  string overview = 2;
  repeated OptimizeWorkExperienceOutput work_experiences = 3;
  repeated OptimizeSkillOutput skills = 4;
  UsageMetadata usage = 5;
}

message ExtractProfileRequest {
  string cv_text = 1;
}

message ExtractWorkExperience {
  string company = 1;
  string role = 2;
  string start_date = 3;
  string end_date = 4;
  string description = 5;
}

message ExtractEducation {
  string institution = 1;
  string degree = 2;
  string field = 3;
  int32 start_year = 4;
  int32 end_year = 5;
}

message ExtractSkill {
  string name = 1;
}

message ExtractProfileResponse {
  string full_name = 1;
  string title = 2;
  string overview = 3;
  string location = 4;
  string contact_email = 5;
  string contact_phone = 6;
  repeated ExtractWorkExperience work_experiences = 7;
  repeated ExtractEducation educations = 8;
  repeated ExtractSkill skills = 9;
  UsageMetadata usage = 10;
}

message EnhanceFieldRequest {
  string content = 1;
  string field_purpose = 2;
}

message EnhanceFieldResponse {
  string enhanced = 1;
  UsageMetadata usage = 2;
}

message ChatMessage {
  string role    = 1;
  string content = 2;
}

message ChatRequest {
  ProfileInput         profile = 1;
  string               message = 2;
  repeated ChatMessage history = 3;
}

message ChatProposal {
  string type        = 1;
  string description = 2;
  string patch_json  = 3;
}

message ChatResponse {
  string       reply    = 1;
  ChatProposal proposal = 2;
  UsageMetadata usage   = 3;
}

message ProfileSummary {
  string name     = 1;
  string title    = 2;
  string overview = 3;
  repeated string skills = 4;
}

message UserChatRequest {
  repeated ProfileSummary profiles = 1;
  string               message = 2;
  repeated ChatMessage history = 3;
  string global_preferences    = 4;
}

message UserChatResponse {
  string        reply              = 1;
  string        preferences_update = 2;
  UsageMetadata usage              = 3;
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
}

message CoverLetterRequest {
  repeated ProfileInput profiles = 1;
  repeated string profile_ids   = 2;
  string job_title              = 3;
  string job_description        = 4;
  string field_context          = 5;
  string global_preferences     = 6;
}

message CoverLetterResponse {
  string        text               = 1;
  string        selected_profile_id = 2;
  UsageMetadata usage              = 3;
}

message SelectBestProfileRequest {
  repeated ProfileInput profiles    = 1;
  repeated string       profile_ids = 2;
  string                job_description = 3;
}

message SelectBestProfileResponse {
  string profile_id = 1;
}