syntax = "proto3";

package llm;

option csharp_namespace = "CvApi.Grpc";

service LlmService {
  rpc Generate (GenerateRequest) returns (GenerateResponse);
  rpc Optimize (OptimizeRequest) returns (OptimizeResponse);
  rpc ExtractProfile (ExtractProfileRequest) returns (ExtractProfileResponse);
  rpc EnhanceField (EnhanceFieldRequest) returns (EnhanceFieldResponse);
  rpc Health (HealthRequest) returns (HealthResponse);
}

message WorkExperienceInput {
  string id = 1;
  string company = 2;
  string role = 3;
  string start_date = 4;
  string end_date = 5;
  string description = 6;
}

message EducationInput {
  string id = 1;
  string institution = 2;
  string degree = 3;
  string field = 4;
  int32 start_year = 5;
  int32 end_year = 6;
}

message SkillInput {
  string id = 1;
  string name = 2;
  string level = 3;
}

message ProfileInput {
  string full_name = 1;
  string title = 2;
  string overview = 3;
  string location = 4;
  repeated WorkExperienceInput work_experiences = 5;
  repeated EducationInput educations = 6;
  repeated SkillInput skills = 7;
}

message GenerateRequest {
  ProfileInput profile = 1;
  string message = 2;
}

message WorkExperienceOutput {
  string company = 1;
  string role = 2;
  string period = 3;
  string description = 4;
}

message EducationOutput {
  string institution = 1;
  string degree = 2;
  string field = 3;
  string period = 4;
}

message GenerateResponse {
  string summary = 1;
  repeated WorkExperienceOutput work_experiences = 2;
  repeated EducationOutput educations = 3;
  repeated string skills = 4;
  repeated string highlights = 5;
}

message OptimizeRequest {
  ProfileInput profile = 1;
  string message = 2;
}

message OptimizeWorkExperienceOutput {
  string company = 1;
  string role = 2;
  string start_date = 3;
  string end_date = 4;
  string description = 5;
}

message OptimizeSkillOutput {
  string name = 1;
}

message OptimizeResponse {
  string title = 1;
  string overview = 2;
  repeated OptimizeWorkExperienceOutput work_experiences = 3;
  repeated OptimizeSkillOutput skills = 4;
}

message ExtractProfileRequest {
  string cv_text = 1;
}

message ExtractWorkExperience {
  string company = 1;
  string role = 2;
  string start_date = 3;
  string end_date = 4;
  string description = 5;
}

message ExtractEducation {
  string institution = 1;
  string degree = 2;
  string field = 3;
  int32 start_year = 4;
  int32 end_year = 5;
}

message ExtractSkill {
  string name = 1;
}

message ExtractProfileResponse {
  string full_name = 1;
  string title = 2;
  string overview = 3;
  string location = 4;
  string contact_email = 5;
  string contact_phone = 6;
  repeated ExtractWorkExperience work_experiences = 7;
  repeated ExtractEducation educations = 8;
  repeated ExtractSkill skills = 9;
}

message EnhanceFieldRequest {
  string content = 1;
  string field_purpose = 2;
}

message EnhanceFieldResponse {
  string enhanced = 1;
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
}