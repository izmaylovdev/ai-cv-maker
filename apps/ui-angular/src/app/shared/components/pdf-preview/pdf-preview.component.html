<div class="fixed inset-0 z-50 flex flex-col bg-white dark:bg-zinc-900">

  <!-- Header -->
  <div class="flex items-center gap-4 px-6 py-4 border-b border-gray-200 dark:border-zinc-700 shrink-0">
    <button type="button" (click)="closed.emit()"
      class="flex items-center gap-1.5 text-sm text-gray-500 dark:text-zinc-400 hover:text-gray-800 dark:hover:text-zinc-100 transition-colors cursor-pointer bg-transparent border-0 font-medium shrink-0">
      <span class="material-icons text-base">arrow_back</span> Back
    </button>
    <div class="h-5 w-px bg-gray-200 dark:bg-zinc-700 shrink-0"></div>
    <p class="flex-1 min-w-0 text-sm font-medium text-gray-800 dark:text-white truncate">{{ title() }}</p>
    <button type="button" (click)="download.emit()" [disabled]="loading() || !safeUrl()"
      class="flex items-center gap-1.5 border border-gray-300 dark:border-zinc-600 bg-white dark:bg-transparent text-gray-600 dark:text-zinc-300 hover:border-blue-400 hover:text-blue-600 dark:hover:text-blue-400 disabled:opacity-40 font-medium rounded-lg px-3.5 py-2 text-sm transition-colors cursor-pointer shrink-0">
      <span class="material-icons text-base">download</span>
      <span class="hidden sm:inline">Download</span>
    </button>
  </div>

  <!-- Loading -->
  @if (loading()) {
    <div class="flex flex-col items-center justify-center flex-1 gap-4">
      <span class="w-12 h-12 border-4 border-blue-100 dark:border-blue-900 border-t-blue-600 rounded-full animate-spin"></span>
      <p class="text-sm text-gray-500 dark:text-zinc-400">Loading PDF…</p>
    </div>
  }

  <!-- PDF -->
  @if (safeUrl()) {
    <iframe [src]="safeUrl()!" class="w-full flex-1 min-h-0 block" title="PDF Preview"></iframe>
  }
</div>
