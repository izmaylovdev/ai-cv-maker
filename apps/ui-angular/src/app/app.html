<div class="flex min-h-screen">

  @if (sidebarOpen()) {
    <div class="fixed inset-0 z-30 bg-black/40 md:hidden" role="button" tabindex="0" aria-label="Close sidebar" (click)="closeSidebar()" (keydown.enter)="closeSidebar()" (keydown.escape)="closeSidebar()"></div>
  }

  <aside
    class="fixed z-40 w-56 h-full bg-white dark:bg-zinc-900 border-r border-gray-200 dark:border-zinc-700 flex flex-col transition-transform duration-200 ease-in-out md:translate-x-0"
    [ngClass]="sidebarOpen() ? 'translate-x-0' : '-translate-x-full'">

    <div class="px-5 h-14 flex items-center gap-2.5 border-b border-gray-100 dark:border-zinc-800 shrink-0">
      <img src="favicon.svg" alt="AI CV Maker" class="w-6 h-6" />
      <span class="font-semibold text-sm text-gray-900 dark:text-white flex-1">Applysy</span>
      <button class="md:hidden flex items-center justify-center w-8 h-8 text-gray-400 hover:text-gray-600 dark:hover:text-zinc-300 bg-transparent border-0 cursor-pointer" (click)="closeSidebar()">
        <span class="material-icons text-[20px]">close</span>
      </button>
    </div>

    @if (auth.isLoggedIn()) {
      <nav class="flex flex-col gap-1 p-3 flex-1">
        <a routerLink="/job-profiles" routerLinkActive="active" class="sidebar-link" (click)="closeSidebar()">
          <span class="material-icons text-[20px]">work</span> Job Profiles
        </a>
        <a routerLink="/chat" routerLinkActive="active" class="sidebar-link" (click)="closeSidebar()">
          <span class="material-icons text-[20px]">chat</span> AI Assistant
        </a>
        <a routerLink="/usage" routerLinkActive="active" class="sidebar-link" (click)="closeSidebar()">
          <span class="material-icons text-[20px]">bar_chart</span> Usage
        </a>
        <a routerLink="/settings" routerLinkActive="active" class="sidebar-link" (click)="closeSidebar()">
          <span class="material-icons text-[20px]">settings</span> Settings
        </a>
      </nav>
      <div class="p-3 border-t border-gray-100 dark:border-zinc-800 flex flex-col gap-1 shrink-0">
        <button (click)="theme.toggle()"
          class="sidebar-link w-full text-left bg-transparent border-0">
          <span class="material-icons text-[20px]">{{ theme.isDark() ? 'light_mode' : 'dark_mode' }}</span>
          {{ theme.isDark() ? 'Light Mode' : 'Dark Mode' }}
        </button>
        <button (click)="auth.logout()"
          class="sidebar-link w-full text-left bg-transparent border-0">
          <span class="material-icons text-[20px]">logout</span> Logout
        </button>
      </div>
    } @else {
      <nav class="flex flex-col gap-1 p-3 flex-1">
        <a routerLink="/auth/login" routerLinkActive="active" class="sidebar-link" (click)="closeSidebar()">
          <span class="material-icons text-[20px]">login</span> Login
        </a>
        <a routerLink="/auth/register" routerLinkActive="active" class="sidebar-link" (click)="closeSidebar()">
          <span class="material-icons text-[20px]">person_add</span> Register
        </a>
      </nav>
      <div class="p-3 border-t border-gray-100 dark:border-zinc-800 shrink-0">
        <button (click)="theme.toggle()"
          class="sidebar-link w-full text-left bg-transparent border-0">
          <span class="material-icons text-[20px]">{{ theme.isDark() ? 'light_mode' : 'dark_mode' }}</span>
          {{ theme.isDark() ? 'Light Mode' : 'Dark Mode' }}
        </button>
      </div>
    }
  </aside>

  <div class="flex-1 flex flex-col min-w-0 md:ml-56">
    <div class="sticky top-0 z-30 md:hidden flex items-center h-14 px-4 bg-white dark:bg-zinc-900 border-b border-gray-200 dark:border-zinc-700 shrink-0">
      <button (click)="toggleSidebar()" class="flex items-center justify-center w-9 h-9 -ml-1 text-gray-500 dark:text-zinc-400 bg-transparent border-0 cursor-pointer">
        <span class="material-icons">menu</span>
      </button>
      <img src="favicon.svg" alt="" class="ml-2 w-5 h-5" />
      <span class="ml-1.5 font-semibold text-sm text-gray-900 dark:text-white">AI CV Maker</span>
    </div>

    <main class="flex-1 px-4 md:px-8">
      <router-outlet />
    </main>
  </div>

</div>

<app-notification-toast />
