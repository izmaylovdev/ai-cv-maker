services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  cv-api:
    build:
      context: .
      dockerfile: apps/cv-api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      JwtSettings__Secret: ${JWT_SECRET}
      LlmService__GrpcUrl: http://llm-service:50051
      Google__WebClientId: ${GOOGLE_WEB_CLIENT_ID}
      Google__ExtensionClientId: ${GOOGLE_EXTENSION_CLIENT_ID}
      Google__ClientSecret: ${GOOGLE_CLIENT_SECRET}
    ports:
      - "5050:8080"
    depends_on:
      postgres:
        condition: service_healthy
      llm-service:
        condition: service_started

  ui-angular:
    build:
      context: .
      dockerfile: apps/ui-angular/Dockerfile
    restart: unless-stopped
    environment:
      CV_API_UPSTREAM: http://cv-api:8080
      CHAT_UI_UPSTREAM: http://chat-ui:80
      NGINX_ENVSUBST_TEMPLATE_VARS: CV_API_UPSTREAM CHAT_UI_UPSTREAM
    ports:
      - "4200:80"
    depends_on:
      - cv-api
      - chat-ui

  chat-ui:
    build:
      context: .
      dockerfile: apps/chat-ui/Dockerfile
    restart: unless-stopped
    ports:
      - "4202:80"

  # LLM_PROVIDER=openai + OPENAI_BASE_URL=http://host.docker.internal:1234/v1 targets LM Studio on the host.
  # LLM_PROVIDER=foundry + FOUNDRY_API_KEY + FOUNDRY_BASE_URL (or FOUNDRY_DEPLOYMENT_NAME) + LLM_MODEL (see .env.example).
  llm-service:
    build:
      context: apps/llm-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      LLM_PROVIDER: ${LLM_PROVIDER:-google}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.4}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-lm-studio}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      FOUNDRY_API_KEY: ${FOUNDRY_API_KEY:-}
      FOUNDRY_BASE_URL: ${FOUNDRY_BASE_URL:-}
      FOUNDRY_DEPLOYMENT_NAME: ${FOUNDRY_DEPLOYMENT_NAME:-}
      ANTHROPIC_FOUNDRY_MAX_TOKENS: ${ANTHROPIC_FOUNDRY_MAX_TOKENS:-8192}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8000"
      - "50051:50051"

  admin-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${ADMIN_DB_USER:-admin}
      POSTGRES_PASSWORD: ${ADMIN_DB_PASSWORD:-changeme}
      POSTGRES_DB: ${ADMIN_DB_NAME:-admin}
    ports:
      - "5434:5432"
    volumes:
      - admin_db_data:/var/lib/postgresql/data
      - ./apps/admin-api/migrations/init-admin-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ADMIN_DB_USER:-admin} -d ${ADMIN_DB_NAME:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  admin-api:
    build:
      context: .
      dockerfile: apps/admin-api/Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      ADMIN_DB_HOST: admin-db
      ADMIN_DB_PORT: "5432"
      ADMIN_DB_NAME: ${ADMIN_DB_NAME:-admin}
      ADMIN_DB_USER: ${ADMIN_DB_USER:-admin}
      ADMIN_DB_PASSWORD: ${ADMIN_DB_PASSWORD:-changeme}
      JWT_SECRET: ${ADMIN_JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_WEB_CLIENT_ID}
      ADMIN_SEED_EMAIL: ${ADMIN_SEED_EMAIL:-}
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      admin-db:
        condition: service_healthy

  admin-ui:
    build:
      context: .
      dockerfile: apps/admin-ui/Dockerfile
      args:
        GRAFANA_URL: http://localhost:3000
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_WEB_CLIENT_ID}
    restart: unless-stopped
    environment:
      ADMIN_API_URL: http://admin-api:3000
      GRAFANA_URL: http://localhost:3000
    ports:
      - "3002:3000"
    depends_on:
      - admin-api

  prometheus:
    image: prom/prometheus:v3.4.0
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    depends_on:
      - cv-api
      - llm-service

  grafana:
    image: grafana/grafana:11.6.0
    restart: unless-stopped
    env_file: .env
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_started
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  admin_db_data:
  prometheus_data:
  grafana_data:
