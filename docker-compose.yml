services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  cv-api:
    build:
      context: .
      dockerfile: apps/cv-api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      JwtSettings__Secret: ${JWT_SECRET}
      LlmService__GrpcUrl: http://llm-service:50051
      Google__ClientId: ${GOOGLE_CLIENT_ID}
    ports:
      - "5050:8080"
    depends_on:
      postgres:
        condition: service_healthy
      llm-service:
        condition: service_started

  ui-angular:
    build:
      context: .
      dockerfile: apps/ui-angular/Dockerfile
    restart: unless-stopped
    environment:
      CV_API_UPSTREAM: http://cv-api:8080
      NGINX_ENVSUBST_TEMPLATE_VARS: CV_API_UPSTREAM
    ports:
      - "4200:80"
    depends_on:
      - cv-api

  # LLM_PROVIDER=openai + OPENAI_BASE_URL=http://host.docker.internal:1234/v1 targets LM Studio on the host.
  # LLM_PROVIDER=foundry + FOUNDRY_API_KEY + FOUNDRY_BASE_URL (or FOUNDRY_DEPLOYMENT_NAME) + LLM_MODEL (see .env.example).
  llm-service:
    build:
      context: apps/llm-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      LLM_PROVIDER: ${LLM_PROVIDER:-google}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.4}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-lm-studio}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      FOUNDRY_API_KEY: ${FOUNDRY_API_KEY:-}
      FOUNDRY_BASE_URL: ${FOUNDRY_BASE_URL:-}
      FOUNDRY_DEPLOYMENT_NAME: ${FOUNDRY_DEPLOYMENT_NAME:-}
      ANTHROPIC_FOUNDRY_MAX_TOKENS: ${ANTHROPIC_FOUNDRY_MAX_TOKENS:-8192}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8000"
      - "50051:50051"

  prometheus:
    image: prom/prometheus:v3.4.0
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    depends_on:
      - cv-api
      - llm-service

  grafana:
    image: grafana/grafana:11.6.0
    restart: unless-stopped
    env_file: .env
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_started
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
