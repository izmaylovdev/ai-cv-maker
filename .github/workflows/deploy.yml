name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      # ── Build & push images ────────────────────────────────────────────────

      - name: Build and push cv-api
        run: |
          docker build \
            -t $ACR_LOGIN_SERVER/cv-api:${{ github.sha }} \
            -t $ACR_LOGIN_SERVER/cv-api:latest \
            -f apps/cv-api/Dockerfile .
          docker push $ACR_LOGIN_SERVER/cv-api:${{ github.sha }}
          docker push $ACR_LOGIN_SERVER/cv-api:latest

      - name: Build and push llm-service
        run: |
          docker build \
            -t $ACR_LOGIN_SERVER/llm-service:${{ github.sha }} \
            -t $ACR_LOGIN_SERVER/llm-service:latest \
            apps/llm-service
          docker push $ACR_LOGIN_SERVER/llm-service:${{ github.sha }}
          docker push $ACR_LOGIN_SERVER/llm-service:latest

      - name: Build and push ui-angular
        run: |
          docker build \
            -t $ACR_LOGIN_SERVER/ui-angular:${{ github.sha }} \
            -t $ACR_LOGIN_SERVER/ui-angular:latest \
            -f apps/ui-angular/Dockerfile .
          docker push $ACR_LOGIN_SERVER/ui-angular:${{ github.sha }}
          docker push $ACR_LOGIN_SERVER/ui-angular:latest

      - name: Build and push prometheus
        run: |
          docker build \
            -t $ACR_LOGIN_SERVER/prometheus:${{ github.sha }} \
            -t $ACR_LOGIN_SERVER/prometheus:latest \
            monitoring/prometheus
          docker push $ACR_LOGIN_SERVER/prometheus:${{ github.sha }}
          docker push $ACR_LOGIN_SERVER/prometheus:latest

      - name: Build and push grafana
        run: |
          docker build \
            -t $ACR_LOGIN_SERVER/grafana:${{ github.sha }} \
            -t $ACR_LOGIN_SERVER/grafana:latest \
            monitoring/grafana
          docker push $ACR_LOGIN_SERVER/grafana:${{ github.sha }}
          docker push $ACR_LOGIN_SERVER/grafana:latest

      - name: Build and push admin-api
        run: |
          docker build \
            -t $ACR_LOGIN_SERVER/admin-api:${{ github.sha }} \
            -t $ACR_LOGIN_SERVER/admin-api:latest \
            -f apps/admin-api/Dockerfile .
          docker push $ACR_LOGIN_SERVER/admin-api:${{ github.sha }}
          docker push $ACR_LOGIN_SERVER/admin-api:latest

      - name: Build and push admin-ui
        run: |
          docker build \
            -t $ACR_LOGIN_SERVER/admin-ui:${{ github.sha }} \
            -t $ACR_LOGIN_SERVER/admin-ui:latest \
            -f apps/admin-ui/Dockerfile .
          docker push $ACR_LOGIN_SERVER/admin-ui:${{ github.sha }}
          docker push $ACR_LOGIN_SERVER/admin-ui:latest

      # ── Deploy to Container Apps ───────────────────────────────────────────

      - name: Deploy llm-service
        run: |
          az containerapp update \
            --name llm-service \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image $ACR_LOGIN_SERVER/llm-service:${{ github.sha }}

      - name: Deploy cv-api
        run: |
          az containerapp update \
            --name cv-api \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image $ACR_LOGIN_SERVER/cv-api:${{ github.sha }}

      - name: Deploy ui-angular
        run: |
          az containerapp update \
            --name ui-angular \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image $ACR_LOGIN_SERVER/ui-angular:${{ github.sha }}

      - name: Deploy prometheus
        run: |
          az containerapp update \
            --name prometheus \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image $ACR_LOGIN_SERVER/prometheus:${{ github.sha }}

      - name: Deploy grafana
        run: |
          az containerapp update \
            --name grafana \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image $ACR_LOGIN_SERVER/grafana:${{ github.sha }}

      - name: Run admin-api migrations
        run: |
          az containerapp job start \
            --name admin-migrate \
            --resource-group ${{ secrets.RESOURCE_GROUP }}
          # Wait for the job to complete (poll every 5s, timeout 120s)
          for i in $(seq 1 24); do
            STATUS=$(az containerapp job execution list \
              --name admin-migrate \
              --resource-group ${{ secrets.RESOURCE_GROUP }} \
              --query "[0].properties.status" -o tsv)
            echo "Migration job status: $STATUS"
            if [ "$STATUS" = "Succeeded" ]; then break; fi
            if [ "$STATUS" = "Failed" ]; then echo "Migration failed"; exit 1; fi
            sleep 5
          done

      - name: Deploy admin-api
        run: |
          az containerapp update \
            --name admin-api \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image $ACR_LOGIN_SERVER/admin-api:${{ github.sha }}

      - name: Deploy admin-ui
        run: |
          az containerapp update \
            --name admin-ui \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image $ACR_LOGIN_SERVER/admin-ui:${{ github.sha }}
