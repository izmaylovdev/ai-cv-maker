name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GCP_REGION: ${{ secrets.GCP_REGION }}
  AR_REGISTRY: ${{ secrets.AR_REGISTRY }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # ── Build & push images ────────────────────────────────────────────────

      - name: Build and push cv-api
        run: |
          docker build \
            -t $AR_REGISTRY/cv-api:${{ github.sha }} \
            -t $AR_REGISTRY/cv-api:latest \
            -f apps/cv-api/Dockerfile .
          docker push $AR_REGISTRY/cv-api:${{ github.sha }}
          docker push $AR_REGISTRY/cv-api:latest

      - name: Build and push llm-service
        run: |
          docker build \
            -t $AR_REGISTRY/llm-service:${{ github.sha }} \
            -t $AR_REGISTRY/llm-service:latest \
            -f apps/llm-service/Dockerfile .
          docker push $AR_REGISTRY/llm-service:${{ github.sha }}
          docker push $AR_REGISTRY/llm-service:latest

      - name: Build and push chat-ui
        run: |
          docker build \
            -t $AR_REGISTRY/chat-ui:${{ github.sha }} \
            -t $AR_REGISTRY/chat-ui:latest \
            -f apps/chat-ui/Dockerfile .
          docker push $AR_REGISTRY/chat-ui:${{ github.sha }}
          docker push $AR_REGISTRY/chat-ui:latest

      - name: Build and push ui-angular
        run: |
          docker build \
            -t $AR_REGISTRY/ui-angular:${{ github.sha }} \
            -t $AR_REGISTRY/ui-angular:latest \
            -f apps/ui-angular/Dockerfile .
          docker push $AR_REGISTRY/ui-angular:${{ github.sha }}
          docker push $AR_REGISTRY/ui-angular:latest

      - name: Build and push prometheus
        run: |
          docker build \
            -t $AR_REGISTRY/prometheus:${{ github.sha }} \
            -t $AR_REGISTRY/prometheus:latest \
            monitoring/prometheus
          docker push $AR_REGISTRY/prometheus:${{ github.sha }}
          docker push $AR_REGISTRY/prometheus:latest

      - name: Build and push grafana
        run: |
          docker build \
            -t $AR_REGISTRY/grafana:${{ github.sha }} \
            -t $AR_REGISTRY/grafana:latest \
            monitoring/grafana
          docker push $AR_REGISTRY/grafana:${{ github.sha }}
          docker push $AR_REGISTRY/grafana:latest

      - name: Build and push admin-api
        run: |
          docker build \
            -t $AR_REGISTRY/admin-api:${{ github.sha }} \
            -t $AR_REGISTRY/admin-api:latest \
            -f apps/admin-api/Dockerfile .
          docker push $AR_REGISTRY/admin-api:${{ github.sha }}
          docker push $AR_REGISTRY/admin-api:latest

      - name: Build and push admin-ui
        run: |
          docker build \
            -t $AR_REGISTRY/admin-ui:${{ github.sha }} \
            -t $AR_REGISTRY/admin-ui:latest \
            -f apps/admin-ui/Dockerfile .
          docker push $AR_REGISTRY/admin-ui:${{ github.sha }}
          docker push $AR_REGISTRY/admin-ui:latest

      # ── Deploy to Cloud Run ────────────────────────────────────────────────

      - name: Deploy llm-service
        run: |
          gcloud run services update llm-service \
            --region $GCP_REGION \
            --image $AR_REGISTRY/llm-service:${{ github.sha }}

      # Apply EF Core migrations as a one-shot job before rolling out the new
      # cv-api revision, so schema changes run exactly once (ADR-0003).
      - name: Run database migrations
        run: |
          gcloud run jobs update cv-api-migrate \
            --region $GCP_REGION \
            --image $AR_REGISTRY/cv-api:${{ github.sha }}
          gcloud run jobs execute cv-api-migrate \
            --region $GCP_REGION \
            --wait

      - name: Deploy cv-api
        run: |
          gcloud run services update cv-api \
            --region $GCP_REGION \
            --image $AR_REGISTRY/cv-api:${{ github.sha }}

      - name: Deploy chat-ui
        run: |
          gcloud run services update chat-ui \
            --region $GCP_REGION \
            --image $AR_REGISTRY/chat-ui:${{ github.sha }}

      - name: Deploy ui-angular
        run: |
          gcloud run services update ui-angular \
            --region $GCP_REGION \
            --image $AR_REGISTRY/ui-angular:${{ github.sha }}

      - name: Deploy prometheus
        run: |
          gcloud run services update prometheus \
            --region $GCP_REGION \
            --image $AR_REGISTRY/prometheus:${{ github.sha }}

      - name: Deploy grafana
        run: |
          gcloud run services update grafana \
            --region $GCP_REGION \
            --image $AR_REGISTRY/grafana:${{ github.sha }}

      - name: Deploy admin-api
        run: |
          gcloud run services update admin-api \
            --region $GCP_REGION \
            --image $AR_REGISTRY/admin-api:${{ github.sha }}

      - name: Deploy admin-ui
        run: |
          gcloud run services update admin-ui \
            --region $GCP_REGION \
            --image $AR_REGISTRY/admin-ui:${{ github.sha }}
